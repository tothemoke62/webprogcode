<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JavaScript CRUD – Net Pizzéria</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">🍕 Net Pizzéria</div>
    <ul class="nav-links">
      <li><a href="index.html">Főoldal</a></li>
      <li><a href="javascript.html" class="active">JavaScript</a></li>
      <li><a href="react.html">React</a></li>
      <li><a href="spa.html">SPA</a></li>
      <li><a href="fetchapi.html">Fetch API</a></li>
      <li><a href="axios.html">Axios</a></li>
      <li><a href="oojs.html">OOJS</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>JavaScript CRUD</h1>
    <p>Pizzák kezelése JavaScript tömbből – Create, Read, Update, Delete</p>
  </div>

  <div class="crud-section">

    <div class="crud-form" id="formContainer">
      <div class="form-group">
        <label for="nev">Pizza neve</label>
        <input type="text" id="nev" placeholder="pl. Margherita" />
      </div>
      <div class="form-group">
        <label for="kategorianev">Kategória</label>
        <select id="kategorianev">
          <option value="">-- válassz --</option>
          <option value="kis">Kis</option>
          <option value="közepes">Közepes</option>
          <option value="nagy">Nagy</option>
          <option value="extra">Extra</option>
        </select>
      </div>
      <div class="form-group">
        <label for="vegetarianus">Vegetáriánus?</label>
        <select id="vegetarianus">
          <option value="true">Igen</option>
          <option value="false">Nem</option>
        </select>
      </div>
      <div class="form-group" style="justify-content: flex-end;">
        <button class="btn btn-primary" onclick="hozzaad()">Hozzáadás</button>
      </div>
    </div>

    <div style="margin-bottom: 1rem; display: flex; gap: 0.75rem; align-items: center;">
      <input type="text" id="kereses" placeholder="🔍 Keresés pizza neve alapján..." oninput="szur()"
        style="padding: 0.6rem 1rem; border: 1.5px solid #E8DDD5; border-radius: 8px;
               font-family: inherit; font-size: 0.95rem; width: 320px; background: #fff; outline: none;" />
      <span id="db" style="color: #8C7B6E; font-size: 0.9rem;"></span>
    </div>

    <table id="pizzaTabla">
      <thead>
        <tr>
          <th>#</th>
          <th>Pizza neve</th>
          <th>Kategória</th>
          <th>Vegetáriánus</th>
          <th>Műveletek</th>
        </tr>
      </thead>
      <tbody id="pizzaTbody"></tbody>
    </table>

  </div>

  <script>
    // ADATOK
    let pizzak = [
      { nev: "Margherita",    kategorianev: "közepes", vegetarianus: true  },
      { nev: "Pepperoni",     kategorianev: "nagy",    vegetarianus: false },
      { nev: "Quattro Formaggi", kategorianev: "extra", vegetarianus: true },
      { nev: "BBQ Csirke",    kategorianev: "nagy",    vegetarianus: false },
      { nev: "Funghi",        kategorianev: "közepes", vegetarianus: true  },
      { nev: "Hawaii",        kategorianev: "kis",     vegetarianus: false },
    ];

    let szerkesztesIndex = -1;

   
    // READ – táblázat megjelenítése
    function megjelenitTabla(lista) {
      const tbody = document.getElementById("pizzaTbody");
      const dbSpan = document.getElementById("db");
      tbody.innerHTML = "";

      lista.forEach((pizza, index) => {
        const sor = document.createElement("tr");
        sor.innerHTML = `
          <td>${index + 1}</td>
          <td><strong>${pizza.nev}</strong></td>
          <td>${pizza.kategorianev}</td>
          <td>
            <span class="badge ${pizza.vegetarianus ? 'badge-green' : 'badge-red'}">
              ${pizza.vegetarianus ? 'Igen' : 'Nem'}
            </span>
          </td>
          <td style="display:flex; gap:0.5rem;">
            <button class="btn btn-edit" onclick="szerkeszt(${index})">Szerkeszt</button>
            <button class="btn btn-delete" onclick="torol(${index})">Töröl</button>
          </td>
        `;
        tbody.appendChild(sor);
      });

      dbSpan.textContent = `${lista.length} pizza`;
    }
    // CREATE
 
    function hozzaad() {
      const nev          = document.getElementById("nev").value.trim();
      const kategorianev = document.getElementById("kategorianev").value;
      const vegetarianus = document.getElementById("vegetarianus").value === "true";

      if (!nev || !kategorianev) {
        alert("Kérlek töltsd ki a pizza nevét és kategóriáját!");
        return;
      }

      //UPDATE
      if (szerkesztesIndex >= 0) {
        pizzak[szerkesztesIndex] = { nev, kategorianev, vegetarianus };
        szerkesztesIndex = -1;
        document.querySelector("#formContainer .btn-primary").textContent = "Hozzáadás";
      } else {
        // CREATE
        const letezik = pizzak.some(p => p.nev.toLowerCase() === nev.toLowerCase());
        if (letezik) {
          alert("Már létezik ilyen nevű pizza!");
          return;
        }
        pizzak.push({ nev, kategorianev, vegetarianus });
      }

      urlapTorles();
      szur();
    }

 
    // UPDATE
    
    function szerkeszt(index) {
      const pizza = pizzak[index];
      document.getElementById("nev").value           = pizza.nev;
      document.getElementById("kategorianev").value  = pizza.kategorianev;
      document.getElementById("vegetarianus").value  = pizza.vegetarianus.toString();

      szerkesztesIndex = index;
      document.querySelector("#formContainer .btn-primary").textContent = "Mentés";
      document.getElementById("nev").focus();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    // DELETE – pizza törlése
    
    function torol(index) {
      if (!confirm(`Biztosan törlöd a(z) "${pizzak[index].nev}" pizzát?`)) return;
      pizzak.splice(index, 1);
      szur();
    }

    // SEARCH – szűrés név alapján
    
    function szur() {
      const keresett = document.getElementById("kereses").value.trim().toLowerCase();
      const szurt = keresett
        ? pizzak.filter(p => p.nev.toLowerCase().includes(keresett))
        : pizzak;
      megjelenitTabla(szurt);
    }

    // SEGÉDFÜGGVÉNY – form ürítése
    function urlapTorles() {
      document.getElementById("nev").value          = "";
      document.getElementById("kategorianev").value = "";
      document.getElementById("vegetarianus").value = "true";
      szerkesztesIndex = -1;
    }
    megjelenitTabla(pizzak);
  </script>

</body>
</html>
